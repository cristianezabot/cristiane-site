- pergunta: "Como funciona a primeira sessão?"
  resposta: "A primeira sessão é um momento de escuta e acolhimento. Realizamos uma entrevista inicial (anamnese) para entender suas demandas, expectativas e iniciar um plano terapêutico adequado."
- pergunta: "O atendimento é online ou presencial?"
  resposta: "Atendo nas duas modalidades, como ficar melhor para você. O atendimento presencial é em Joinville."
- pergunta: "Quantas sessões vou precisar?"
  resposta: "A quantidade de sessões varia conforme cada pessoa e seus objetivos. Durante os primeiros encontros, avaliamos juntas suas necessidades para definir o melhor caminho terapêutico."
- pergunta: "Qual o valor das sessões?"
  resposta: "Os valores variam conforme o plano contratado. Há planos com 4, 8 e 12 sessões. Entre em contato pelo WhatsApp para mais informações."
- pergunta: "Qual a forma de pagamento?"
  resposta: "PIX e Cartão de Crédito (com possibilidade de parcelamento)."
- pergunta: "Como agendar uma sessão?"
  resposta: "O agendamento é feito de forma simples pelo Whatsapp. Clique no botão “Agendar Consulta” ou [aqui](https://api.whatsapp.com/send?phone=5547996065858&text=Ol%C3%A1%2C%20vim%20atrav%C3%A9s%20do%20site%20e%20gostaria%20de%20agendar%20uma%20consulta.) para iniciar a conversa diretamente comigo.
