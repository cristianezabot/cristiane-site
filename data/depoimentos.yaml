- texto: "Foram apenas 4 encontros, mas muito proveitosos. Saio com certeza com boas ferramentas em mãos para colocar em prática. Deus abençoe seu caminho e que você continue sendo luz na vida de tantas mulheres."
  autor: "P., 39 anos"
- texto: "Cheguei à terapia com a dra Cristiane com o emocional totalmente despedaçado, depressiva e sem perspectiva de melhora. As sessões me ajudaram a encontrar a fortaleza necessária para enfrentar as situações e direcionar minha espiritualidade para ações mais efetivas, transformando a visão de desânimo e incertezas em oportunidades de crescimento pessoal em diferentes aspectos da minha vida."
  autor: "D., 57 anos"
- texto: "O trabalho da Cris é excepcional! Ela consegue unir tão bem o profissionalismo com um carinho de mãe que só de estar com ela é muito fácil de constatar que é alguém em que se pode confiar de olhos fechados. Sempre clareou minhas ideias, me abriu horizontes e aliviou meu coração. Eu sou muito grata pelo trabalho da Cris, de fato mudou a minha vida."
  autor: "A., 27 anos"
